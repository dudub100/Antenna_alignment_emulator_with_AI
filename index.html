<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antenna Alignment AI Emulator</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-align: center; padding: 15px; background-color: #f4f4f9; touch-action: manipulation; }
        h2 { color: #333; }
        #modelStatus { font-weight: bold; margin: 15px 0; font-size: 1.2em; color: #555; background: #e9ecef; padding: 10px; border-radius: 8px; }
        button { padding: 15px 20px; margin: 10px 5px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; color: white; font-weight: bold; width: 90%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #startBtn { background-color: #28a745; }
        #predictBtn { background-color: #6f42c1; }
        #predictBtn:disabled { background-color: #cccccc; cursor: not-allowed; box-shadow: none; }
        canvas { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; max-width: 100%; }
    </style>
</head>
<body>

    <h2>Antenna Alignment AI</h2>
    
    <div id="modelStatus">⏳ Checking CNN Model...</div>

    <button id="startBtn" onclick="toggleSensors()">Start Sensors</button>
    <button id="predictBtn" onclick="predictPeak()" disabled>🧠 PREDICT PEAK WITH CNN</button>

    <canvas id="scanChart" width="400" height="300"></canvas>

    <script>
        // --- GLOBAL VARIABLES ---
        let cnnModel = null;
        let scanData = []; 
        let isScanning = false;
        let chart;

        // --- 1. INITIALIZE THE NEURAL NETWORK ---
        async function initTFModel() {
            try {
                // Your exact absolute URL
                const modelUrl = 'https://dudub100.github.io/Antenna_alignment_emulator_with_AI/model/model.json';
                
                console.log("Attempting to load:", modelUrl);
                cnnModel = await tf.loadLayersModel(modelUrl);
                
                // Success UI Update
                const statusDiv = document.getElementById('modelStatus');
                statusDiv.innerText = "✅ CNN Model Loaded and Ready";
                statusDiv.style.backgroundColor = "#d4edda";
                statusDiv.style.color = "#155724";
                
                // Unlock the purple predict button
                document.getElementById('predictBtn').disabled = false;
                
            } catch (error) {
                // Failure UI Update
                const statusDiv = document.getElementById('modelStatus');
                statusDiv.innerText = "❌ Load Failed (Check Alert)";
                statusDiv.style.backgroundColor = "#f8d7da";
                statusDiv.style.color = "#721c24";
                alert("CRASH REPORT:\n" + error.message);
            }
        }

        // --- 2. SENSOR CONTROL & IOS PERMISSIONS ---
        async function toggleSensors() {
            const btn = document.getElementById('startBtn');
            
            // If currently scanning, stop it
            if (isScanning) {
                isScanning = false;
                window.removeEventListener('deviceorientation', handleOrientation);
                btn.innerText = "Start Sensors";
                btn.style.backgroundColor = "#28a745"; // Green
                return;
            }

            // Request iOS 13+ Device Orientation permissions
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        startSweep(btn);
                    } else {
                        alert("Permission to use gyroscope was denied.");
                    }
                } catch (error) {
                    alert("Error requesting sensor permission: " + error);
                }
            } else {
                // Non-iOS or older devices
                startSweep(btn);
            }
        }

        function startSweep(btn) {
            isScanning = true;
            scanData = []; // Clear old graph
            chart.data.datasets[0].data = []; // Clear chart UI
            chart.update();
            
            btn.innerText = "Stop Scanning";
            btn.style.backgroundColor = "#dc3545"; // Red
            window.addEventListener('deviceorientation', handleOrientation);
        }

        // --- 3. GATHERING DATA (SIMULATED RSL FROM GYRO) ---
        function handleOrientation(event) {
            if (!isScanning) return;
            
            // Get compass direction (0-360)
            let azimuth = event.alpha || 0;
            
            // Simulated RSL logic (Pretending the peak is at exactly 180 degrees)
            let distanceToTarget = Math.abs(azimuth - 180);
            if (distanceToTarget > 180) distanceToTarget = 360 - distanceToTarget;
            
            // Fake RSL drops off from -30 to -90 based on how far away you point
            let rsl = -90 + (60 * Math.max(0, 1 - (distanceToTarget / 45))); 
            rsl += (Math.random() * 2 - 1); // Add a tiny bit of noise

            // Save the data point
            scanData.push({ x: azimuth, y: rsl });
            
            // Update chart visually every 5 ticks to save iPad battery
            if (scanData.length % 5 === 0) {
                chart.data.datasets[0].data = scanData;
                chart.update();
            }
        }

        // --- 4. PREDICTING WITH THE CNN ---
        async function predictPeak() {
            if (!cnnModel) {
                alert("Model is still loading or failed to load.");
                return;
            }
            if (scanData.length < 10) {
                alert("Please sweep the iPad to gather more sensor data first.");
                return;
            }

            try {
                // Extract just the RSL numbers
                let rawRsl = scanData.map(d => d.y);
                
                // The Python model expects EXACTLY 100 data points.
                let formattedInput = [];
                if (rawRsl.length >= 100) {
                    // Take the last 100 points
                    formattedInput = rawRsl.slice(-100);
                } else {
                    // Pad the beginning with -90 (noise floor) if sweep was too short
                    formattedInput = new Array(100 - rawRsl.length).fill(-90).concat(rawRsl);
                }

                // Reshape to [1, 100, 1] for the TensorFlow model
                const inputTensor = tf.tensor3d([formattedInput], [1, 100, 1]);
                
                // Ask the AI for the answer!
                const prediction = cnnModel.predict(inputTensor);
                const predictedValue = await prediction.data();
                
                // Clean up memory to prevent iPad freezing
                inputTensor.dispose();
                prediction.dispose();
                
                // Show the result
                alert("🎯 AI Prediction Complete!\n\nPredicted Peak RSL/Angle: " + predictedValue[0].toFixed(2));
                
            } catch (error) {
                alert("Prediction Error: " + error.message);
            }
        }

        // --- 5. SETUP CHART.JS ---
        const ctx = document.getElementById('scanChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'RSL Sweep Data',
                    data: [],
                    backgroundColor: '#007bff'
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'Azimuth (Degrees)' } },
                    y: { title: { display: true, text: 'Simulated RSL (dBm)' }, max: -20, min: -100 }
                },
                animation: false // Turn off animations for faster sweeps
            }
        });

        // --- 6. BOOT UP WHEN PAGE LOADS ---
        window.onload = initTFModel;
    </script>
</body>
</html>
